name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify source entry points
        run: npm run verify

      - name: Run test suite
        run: npm test

      - name: Build deployable site
        run: npm run build:dist

      - name: Check deploy secrets
        id: cloudflare
        shell: bash
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare deploy secrets are not configured; skipping deploy."
          elif ! npx wrangler pages project list >/dev/null 2>&1; then
            echo "::error::Cloudflare deploy credentials are set but invalid. Regenerate CLOUDFLARE_API_TOKEN and update the repo secret."
            exit 1
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.cloudflare.outputs.ready == 'true'
        run: npx wrangler pages deploy dist --project-name=alexnava-me
